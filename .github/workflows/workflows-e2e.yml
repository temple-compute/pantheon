name: Workflows e2e

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "workflows/**"
      - ".github/workflows/workflows-e2e.yml"
  push:
    branches: [main]
    paths:
      - "workflows/**"
      - ".github/workflows/workflows-e2e.yml"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.list.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          dirs=$(find workflows -mindepth 2 -maxdepth 2 -type d \
            | while read -r d; do
                { [ -f "$d/workflow.yaml" ] || [ -f "$d/run.py" ]; } && echo "$d"
              done \
            | sort | jq -R . | jq -sc .)
          echo "workflows=$dirs" >> "$GITHUB_OUTPUT"

  run:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        workflow_dir: ${{ fromJson(needs.discover.outputs.workflows) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: horus-ci
          init-shell: bash

      - name: Run workflow
        shell: bash -el {0}
        working-directory: ${{ matrix.workflow_dir }}
        run: |
          uv sync
          if [ -f workflow.yaml ]; then
            uv run horus run workflow.yaml
          else
            uv run python run.py
          fi
