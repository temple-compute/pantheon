kind: horus_workflow
name: Subworkflow Reuse Showcase
tasks:
  - kind: horus_task
    id: split
    name: Split quotes into per-quote files
    inputs:
      - id: quotes
        kind: file
        path: examples/quotes.txt
    outputs:
      - id: quote_a
        kind: file
        path: quote_a.txt
      - id: quote_b
        kind: file
        path: quote_b.txt
    executor:
      kind: shell
    runtime:
      kind: python_script
      script: scripts/split_quotes.py
      python: python3 # stdlib-only; use the target's python3
      args: --quotes ${quotes} --out-a ${quote_a} --out-b ${quote_b}
    target:
      kind: local

  # `clean_a` and `clean_b` are two instances of the *same* child workflow, a
  # `trim -> shout` pipeline, written once as a YAML anchor (`&clean_pipeline`)
  # and reused by alias (`*clean_pipeline`) on the second task — a native
  # YAML feature, no custom tooling needed. Ports are derived, not declared:
  # the in-port is the body's one root artifact (`text`), the out-port is
  # `shout`'s unconsumed output (`clean`). Each instance's inner tasks are
  # inlined at distinct ids (`clean_a/trim`, `clean_b/trim`), so reusing the
  # identical body twice never collides, even though both clones write to the
  # same relative paths (`trimmed.txt`, `clean.txt`) inside their own task
  # working directory.
  - id: clean_a
    name: Clean quote A (subworkflow)
    sub: &clean_pipeline
      kind: horus_workflow
      name: clean pipeline
      artifacts:
        - id: text
          kind: file
          path: text_in.txt
      tasks:
        - kind: horus_task
          id: trim
          name: trim
          inputs:
            - id: text
              kind: file
              path: text_in.txt
          outputs:
            - id: trimmed
              kind: file
              path: trimmed.txt
          runtime:
            kind: command
            command: "awk '{$1=$1;print}' $text > $trimmed"
          executor:
            kind: shell
          target:
            kind: local
        - kind: horus_task
          id: shout
          name: shout
          inputs:
            - id: trimmed
              kind: file
              path: trimmed.txt
          outputs:
            - id: clean
              kind: file
              path: clean.txt
          runtime:
            kind: command
            command: "tr a-z A-Z < $trimmed > $clean"
          executor:
            kind: shell
          target:
            kind: local
      edges:
        - source: artifact-text
          source_output: text
          target: trim
          target_input: text
        - source: trim
          source_output: trimmed
          target: shout
          target_input: trimmed

  - id: clean_b
    name: Clean quote B (subworkflow)
    sub: *clean_pipeline

  - kind: horus_task
    id: combine
    name: Combine cleaned quotes into a report
    inputs:
      - id: a
        kind: file
        path: clean_a.txt
      - id: b
        kind: file
        path: clean_b.txt
    outputs:
      - id: report
        kind: file
        path: results/report.txt
    executor:
      kind: shell
    runtime:
      kind: python_script
      script: scripts/combine_reports.py
      python: python3 # stdlib-only; use the target's python3
      args: --a ${a} --b ${b} --out ${report}
    target:
      kind: local

edges:
  - source: split
    source_output: quote_a
    target: clean_a
    target_input: text
  - source: split
    source_output: quote_b
    target: clean_b
    target_input: text
  - source: clean_a
    source_output: clean
    target: combine
    target_input: a
  - source: clean_b
    source_output: clean
    target: combine
    target_input: b

orchestrator_target:
  kind: local
  working_directory: horus_workflow_results
