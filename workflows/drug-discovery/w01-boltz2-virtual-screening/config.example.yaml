# W-01 Boltz-2 virtual screening — copy to config.yaml and edit.
# config.yaml is gitignored; never commit credentials.

# ---------------------------------------------------------------------------
# GPU stage location: "ssh" (default) runs predict on a remote box; "local"
# runs it on this machine (handy for a no-SSH smoke test).
# ---------------------------------------------------------------------------
predict_target: ssh

# SSH GPU box (only used when predict_target: ssh). Must have the chosen
# container engine + NVIDIA runtime, or boltz on PATH for engine: baremetal.
ssh:
  host: gpu-box.example.com
  port: 22
  username: youruser
  # Auth: set ONE of client_keys or password.
  client_keys: ["~/.ssh/id_ed25519"]
  # password: "..."
  working_directory: /tmp/horus-boltz2   # scratch dir on the remote host
  verify_host_key: true                  # false only for throwaway demo rigs

# ---------------------------------------------------------------------------
# Container engine for the predict stage: docker | singularity | baremetal.
# This single knob is the docker/singularity/baremetal switch.
# ---------------------------------------------------------------------------
engine: docker
image: boltz2:latest        # docker tag, or path to boltz2.sif for singularity
boltz_args: "--use_msa_server"   # passed through to `boltz predict`

# Inputs (local paths on this machine).
inputs:
  fasta: ./examples/target.fasta
  ligands: ./examples/ligands.smi

# Local directory for all outputs (boltz_inputs.tar.gz, predictions.tar.gz,
# top_hits.csv).
out_dir: ./results
