kind: horus_workflow
name: BioExcel AMBER ABC Setup - Drew-Dickerson Dodecamer DNA

_executor: &executor
  kind: conda_python_environment
  environment_dir: "../.horus_conda_env"
  conda: micromamba
  environment_file: conda_env.yaml


_docker_executor: &docker_executor
  kind: docker
  image: quay.io/biocontainers/biobb_amber:5.2.1--py312hc5e4ab4_0

_target: &target
  kind: local

artifacts:
  - id: md_mdin
    kind: file
    path: ABCix_config_files/md.in

  - id: step1_mdin
    kind: file
    path: ABCix_config_files/step1.in

  - id: step10_mdin
    kind: file
    path: ABCix_config_files/step10.in

  - id: step2_mdin
    kind: file
    path: ABCix_config_files/step2.in

  - id: step3_mdin
    kind: file
    path: ABCix_config_files/step3.in

  - id: step4_mdin
    kind: file
    path: ABCix_config_files/step4.in

  - id: step5_mdin
    kind: file
    path: ABCix_config_files/step5.in

  - id: step6_mdin
    kind: file
    path: ABCix_config_files/step6.in

  - id: step7_mdin
    kind: file
    path: ABCix_config_files/step7.in

  - id: step8_mdin
    kind: file
    path: ABCix_config_files/step8.in

  - id: step9_mdin
    kind: file
    path: ABCix_config_files/step9.in

  - id: dna_pdb
    kind: file
    path: CGCGAATTCGCG.pdb

  - id: cpptraj_randomize_ions_config
    kind: file
    path: configs/cpptraj_randomize_ions.yaml

  - id: leap_add_ions_config
    kind: file
    path: configs/leap_add_ions.yaml

  - id: leap_gen_top_config
    kind: file
    path: configs/leap_gen_top.yaml

  - id: leap_solvate_config
    kind: file
    path: configs/leap_solvate.yaml

  - id: process_eq1_config
    kind: file
    path: configs/process_eq1.yaml

  - id: process_eq10_config
    kind: file
    path: configs/process_eq10.yaml

  - id: process_eq2_config
    kind: file
    path: configs/process_eq2.yaml

  - id: process_eq3_config
    kind: file
    path: configs/process_eq3.yaml

  - id: process_eq4_config
    kind: file
    path: configs/process_eq4.yaml

  - id: process_eq5_config
    kind: file
    path: configs/process_eq5.yaml

  - id: process_eq6_config
    kind: file
    path: configs/process_eq6.yaml

  - id: process_eq7_config
    kind: file
    path: configs/process_eq7.yaml

  - id: process_eq8_config
    kind: file
    path: configs/process_eq8.yaml

  - id: process_eq9_config
    kind: file
    path: configs/process_eq9.yaml

  - id: sander_eq1_config
    kind: file
    path: configs/sander_eq1.yaml

  - id: sander_eq10_config
    kind: file
    path: configs/sander_eq10.yaml

  - id: sander_eq2_config
    kind: file
    path: configs/sander_eq2.yaml

  - id: sander_eq3_config
    kind: file
    path: configs/sander_eq3.yaml

  - id: sander_eq4_config
    kind: file
    path: configs/sander_eq4.yaml

  - id: sander_eq5_config
    kind: file
    path: configs/sander_eq5.yaml

  - id: sander_eq6_config
    kind: file
    path: configs/sander_eq6.yaml

  - id: sander_eq7_config
    kind: file
    path: configs/sander_eq7.yaml

  - id: sander_eq8_config
    kind: file
    path: configs/sander_eq8.yaml

  - id: sander_eq9_config
    kind: file
    path: configs/sander_eq9.yaml

  - id: sander_md_config
    kind: file
    path: configs/sander_md.yaml

tasks:
  - kind: horus_task
    id: leap_gen_top
    name: Create DNA system topology (leap)
    inputs:
      - id: leap_gen_top_config
        kind: file
        path: configs/leap_gen_top.yaml
      - id: dna_pdb
        kind: file
        path: CGCGAATTCGCG.pdb
    outputs:
      - id: leap_pdb
        kind: file
        path: results/structure.leap.pdb
      - id: leap_top
        kind: file
        path: results/structure.leap.top
      - id: leap_crd
        kind: file
        path: results/structure.leap.crd
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        leap_gen_top
        --config ${leap_gen_top_config}
        --input_pdb_path ${dna_pdb}
        --output_pdb_path ${leap_pdb}
        --output_top_path ${leap_top}
        --output_crd_path ${leap_crd}
    target: *target

  - kind: horus_task
    id: leap_solvate
    name: Create solvent box and solvate DNA system (leap)
    inputs:
      - id: leap_solvate_config
        kind: file
        path: configs/leap_solvate.yaml
      - id: leap_pdb
        kind: file
        path: results/structure.leap.pdb
    outputs:
      - id: solv_pdb
        kind: file
        path: results/structure.solv.pdb
      - id: solv_top
        kind: file
        path: results/structure.solv.parmtop
      - id: solv_crd
        kind: file
        path: results/structure.solv.crd
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        leap_solvate
        --config ${leap_solvate_config}
        --input_pdb_path ${leap_pdb}
        --output_pdb_path ${solv_pdb}
        --output_top_path ${solv_top}
        --output_crd_path ${solv_crd}
    target: *target

  - kind: horus_task
    id: leap_add_ions
    name: Add ions at 100 mM concentration (leap)
    inputs:
      - id: leap_add_ions_config
        kind: file
        path: configs/leap_add_ions.yaml
      - id: solv_pdb
        kind: file
        path: results/structure.solv.pdb
    outputs:
      - id: ions_pdb
        kind: file
        path: results/structure.ions.pdb
      - id: ions_top
        kind: file
        path: results/structure.ions.parmtop
      - id: ions_crd
        kind: file
        path: results/structure.ions.crd
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        leap_add_ions
        --config ${leap_add_ions_config}
        --input_pdb_path ${solv_pdb}
        --output_pdb_path ${ions_pdb}
        --output_top_path ${ions_top}
        --output_crd_path ${ions_crd}
    target: *target

  - kind: horus_task
    id: cpptraj_randomize_ions
    name: Randomize ion positions (cpptraj)
    inputs:
      - id: cpptraj_randomize_ions_config
        kind: file
        path: configs/cpptraj_randomize_ions.yaml
      - id: ions_top
        kind: file
        path: results/structure.ions.parmtop
      - id: ions_crd
        kind: file
        path: results/structure.ions.crd
    outputs:
      - id: rand_ions_crd
        kind: file
        path: results/structure.randIons.crd
      - id: rand_ions_pdb
        kind: file
        path: results/structure.randIons.pdb
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        cpptraj_randomize_ions
        --config ${cpptraj_randomize_ions_config}
        --input_top_path ${ions_top}
        --input_crd_path ${ions_crd}
        --output_pdb_path ${rand_ions_pdb}
        --output_crd_path ${rand_ions_crd}
    target: *target

  - kind: horus_task
    id: parmed_hmassrepartition
    name: Hydrogen mass repartitioning for 4 fs timestep (parmed)
    inputs:
      - id: ions_top
        kind: file
        path: results/structure.ions.parmtop
    outputs:
      - id: top_4fs
        kind: file
        path: results/structure.leap.4fs.top
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        parmed_hmassrepartition
        --input_top_path ${ions_top}
        --output_top_path ${top_4fs}
    target: *target

  - kind: horus_task
    id: sander_eq1
    name: Equilibration step 1 - Minimization with restraints (sander)
    inputs:
      - id: sander_eq1_config
        kind: file
        path: configs/sander_eq1.yaml
      - id: top_4fs
        kind: file
        path: results/structure.leap.4fs.top
      - id: step1_mdin
        kind: file
        path: ABCix_config_files/step1.in
      - id: rand_ions_crd
        kind: file
        path: results/structure.randIons.crd
    outputs:
      - id: eq1_traj
        kind: file
        path: results/sander.eq1.nc
      - id: eq1_rst
        kind: file
        path: results/sander.eq1.ncrst
      - id: eq1_log
        kind: file
        path: results/sander.eq1.log
      - id: eq1_mdinfo
        kind: file
        path: results/sander.eq1.mdinfo
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        sander_mdrun
        --config ${sander_eq1_config}
        --input_top_path ${top_4fs}
        --input_mdin_path ${step1_mdin}
        --input_crd_path ${rand_ions_crd}
        --input_ref_path ${rand_ions_crd}
        --output_traj_path ${eq1_traj}
        --output_rst_path ${eq1_rst}
        --output_log_path ${eq1_log}
        --output_mdinfo_path ${eq1_mdinfo}
    target: *target

  - kind: horus_task
    id: process_eq1
    name: Extract eq1 minimization energy (process_minout)
    inputs:
      - id: process_eq1_config
        kind: file
        path: configs/process_eq1.yaml
      - id: eq1_log
        kind: file
        path: results/sander.eq1.log
    outputs:
      - id: eq1_dat
        kind: file
        path: results/sander.eq1.energy.dat
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        process_minout
        --config ${process_eq1_config}
        --input_log_path ${eq1_log}
        --output_dat_path ${eq1_dat}
    target: *target

  - kind: horus_task
    id: sander_eq2
    name: Equilibration step 2 - Heating with restraints (sander)
    inputs:
      - id: sander_eq2_config
