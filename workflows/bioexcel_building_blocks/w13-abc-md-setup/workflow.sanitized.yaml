        --output_traj_path ${eq2_traj}
        --output_rst_path ${eq2_rst}
        --output_log_path ${eq2_log}
        --output_mdinfo_path ${eq2_mdinfo}
    target: *target

  - kind: horus_task
    id: process_eq2
    name: Extract eq2 temperature (process_mdout)
    inputs:
      - id: process_eq2_config
