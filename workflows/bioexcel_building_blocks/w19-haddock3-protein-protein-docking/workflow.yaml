        --config ${cx_tidy_final_config}
        --input_file_path ${cx_tidy_final_in}
        --output_file_path ${complex_prep}
    target:
      kind: local

  # ── Restraint generation ─────────────────────────────────────────────────

  - kind: horus_task
    id: write_ab_actpass
    name: Write antibody paratope active residues file
    outputs:
      - id: ab_actpass
        kind: file
        path: results/4G6K_actpass.txt
    executor: *executor
    runtime:
      kind: command
      command: >-
        printf "31 32 33 34 35 52 54 55 56 100 101 102 103 104 105 106 151 152 169 170 173 211 212 213 214 216\n\n"
        > ${ab_actpass}
    target:
      kind: local

  - kind: horus_task
    id: passive_from_active
    name: Compute passive residues around antigen epitope
    inputs:
      - id: passive_from_active_config
        kind: file
        path: configs/passive_from_active.yaml
      - id: antigen_prep
        kind: file
        path: results/4I1B_clean.pdb
    outputs:
      - id: ag_actpass
        kind: file
        path: results/4I1B_actpass.txt
    executor: *executor
    runtime:
      kind: command
      command: >-
        haddock3_passive_from_active
        --config ${passive_from_active_config}
        --input_pdb_path ${antigen_prep}
        --output_actpass_path ${ag_actpass}
    target:
      kind: local

  - kind: horus_task
    id: actpass_to_ambig
    name: Convert active/passive residues to ambiguous restraints (AIR)
    inputs:
      - id: actpass_to_ambig_config
        kind: file
        path: configs/actpass_to_ambig.yaml
      - id: ab_actpass
        kind: file
        path: results/4G6K_actpass.txt
      - id: ag_actpass
        kind: file
        path: results/4I1B_actpass.txt
    outputs:
      - id: complex_tbl
        kind: file
        path: results/ambig-paratope-NMR-epitope.tbl
    executor: *executor
    runtime:
      kind: command
      command: >-
        haddock3_actpass_to_ambig
        --config ${actpass_to_ambig_config}
        --input_actpass1_path ${ab_actpass}
        --input_actpass2_path ${ag_actpass}
        --output_tbl_path ${complex_tbl}
    target:
      kind: local

  - kind: horus_task
    id: restrain_bodies
    name: Generate multi-body restraints to tie antibody chains
    inputs:
      - id: antibody_prep
        kind: file
        path: results/4G6K_clean.pdb
    outputs:
      - id: body_tbl
        kind: file
        path: results/antibody-unambig.tbl
    executor: *executor
    runtime:
      kind: command
      command: >-
        haddock3_restrain_bodies
        --input_structure_path ${antibody_prep}
        --output_tbl_path ${body_tbl}
    target:
      kind: local

  # ── HADDOCK docking pipeline ─────────────────────────────────────────────

  - kind: horus_task
    id: topology
    name: Build HADDOCK topology for both molecules
    inputs:
      - id: antibody_prep
        kind: file
        path: results/4G6K_clean.pdb
      - id: antigen_prep
        kind: file
        path: results/4I1B_clean.pdb
    outputs:
      - id: mol1_top_zip
        kind: file
        path: results/1_top_mol1.zip
      - id: mol2_top_zip
        kind: file
        path: results/1_top_mol2.zip
      - id: haddock_wf_data
        kind: file
        path: results/haddock_wf_data
    executor: *executor
    runtime:
      kind: command
      command: >-
        topology
        --mol1_input_pdb_path ${antibody_prep}
        --mol2_input_pdb_path ${antigen_prep}
        --mol1_output_top_zip_path ${mol1_top_zip}
        --mol2_output_top_zip_path ${mol2_top_zip}
        --output_haddock_wf_data ${haddock_wf_data}
    target:
      kind: local

  - kind: horus_task
    id: rigid_body
    name: Rigid-body docking (rigidbody, 10 models)
    inputs:
      - id: rigid_body_config
        kind: file
        path: configs/rigid_body.yaml
      - id: haddock_wf_data_in
        kind: file
        path: results/haddock_wf_data
      - id: complex_tbl
        kind: file
        path: results/ambig-paratope-NMR-epitope.tbl
      - id: body_tbl
        kind: file
        path: results/antibody-unambig.tbl
    outputs:
      - id: haddock_wf_data_rigid
        kind: file
        path: results/haddock_wf_data
      - id: docking_zip
        kind: file
        path: results/2_docking.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        rigid_body
        --config ${rigid_body_config}
        --input_haddock_wf_data ${haddock_wf_data_in}
        --output_haddock_wf_data ${haddock_wf_data_rigid}
        --docking_output_zip_path ${docking_zip}
        --ambig_restraints_table_path ${complex_tbl}
        --unambig_restraints_table_path ${body_tbl}
    target:
      kind: local

  - kind: horus_task
    id: capri_eval_1
    name: CAPRI evaluation after rigid-body docking
    inputs:
      - id: haddock_wf_data_in
        kind: file
        path: results/haddock_wf_data
      - id: complex_prep
        kind: file
        path: results/4G6M_clean.pdb
    outputs:
      - id: haddock_wf_data_capri1
        kind: file
        path: results/haddock_wf_data
      - id: caprieval1_zip
        kind: file
