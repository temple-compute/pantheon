kind: horus_workflow
name: BioExcel HADDOCK Antibody-Antigen Protein-Protein Docking

_executor: &executor
  kind: conda_python_environment
  environment_dir: "../.horus_conda_env"
  conda: micromamba
  environment_file: conda_env.yaml

tasks:

  # ── Structure download ────────────────────────────────────────────────────

  - kind: horus_task
    id: fetch_antibody
    name: Download antibody structure 4G6K from PDB
    inputs:
      - id: fetch_antibody_config
        kind: file
        path: configs/fetch_antibody.yaml
    outputs:
      - id: ab_0_pdb
        kind: file
        path: results/4G6K_0.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        pdb
        --config ${fetch_antibody_config}
        --output_pdb_path ${ab_0_pdb}
    target:
      kind: local

  - kind: horus_task
    id: fetch_antigen
    name: Download antigen structure 4I1B from PDB
    inputs:
      - id: fetch_antigen_config
        kind: file
        path: configs/fetch_antigen.yaml
    outputs:
      - id: ag_0_pdb
        kind: file
        path: results/4I1B_0.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        pdb
        --config ${fetch_antigen_config}
        --output_pdb_path ${ag_0_pdb}
    target:
      kind: local

  - kind: horus_task
    id: fetch_complex
    name: Download reference complex structure 4G6M from PDB
    inputs:
      - id: fetch_complex_config
        kind: file
        path: configs/fetch_complex.yaml
    outputs:
      - id: cx_0_pdb
        kind: file
        path: results/4G6M_0.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        pdb
        --config ${fetch_complex_config}
        --output_pdb_path ${cx_0_pdb}
    target:
      kind: local

  # ── Antibody H-chain preparation ─────────────────────────────────────────

  - kind: horus_task
    id: ab_H_tidy
    name: Tidy antibody PDB (strict, pre H-chain extraction)
    inputs:
      - id: ab_H_tidy_config
        kind: file
        path: configs/pdb_tidy_strict.yaml
      - id: ab_H_tidy_in
        kind: file
        path: results/4G6K_0.pdb
    outputs:
      - id: ab_H_tidy_out
        kind: file
        path: results/ab_H_tidy.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --config ${ab_H_tidy_config}
        --input_file_path ${ab_H_tidy_in}
        --output_file_path ${ab_H_tidy_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_selchain
    name: Extract heavy chain H from antibody
    inputs:
      - id: ab_H_selchain_config
        kind: file
        path: configs/selchain_H.yaml
      - id: ab_H_selchain_in
        kind: file
        path: results/ab_H_tidy.pdb
    outputs:
      - id: ab_H_selchain_out
        kind: file
        path: results/ab_H_selchain.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selchain
        --config ${ab_H_selchain_config}
        --input_file_path ${ab_H_selchain_in}
        --output_file_path ${ab_H_selchain_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_delhetatm
    name: Remove HETATM records from antibody H chain
    inputs:
      - id: ab_H_delhetatm_in
        kind: file
        path: results/ab_H_selchain.pdb
    outputs:
      - id: ab_H_delhetatm_out
        kind: file
        path: results/ab_H_delhetatm.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_delhetatm
        --input_file_path ${ab_H_delhetatm_in}
        --output_file_path ${ab_H_delhetatm_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_fixinsert
    name: Fix insertion codes in antibody H chain
    inputs:
      - id: ab_H_fixinsert_in
        kind: file
        path: results/ab_H_delhetatm.pdb
    outputs:
      - id: ab_H_fixinsert_out
        kind: file
        path: results/ab_H_fixinsert.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_fixinsert
        --input_file_path ${ab_H_fixinsert_in}
        --output_file_path ${ab_H_fixinsert_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_selaltloc
    name: Select highest-occupancy alt-locs in antibody H chain
    inputs:
      - id: ab_H_selaltloc_in
        kind: file
        path: results/ab_H_fixinsert.pdb
    outputs:
      - id: ab_H_selaltloc_out
        kind: file
        path: results/ab_H_selaltloc.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selaltloc
        --input_file_path ${ab_H_selaltloc_in}
        --output_file_path ${ab_H_selaltloc_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_keepcoord
    name: Remove non-coordinate records from antibody H chain
    inputs:
      - id: ab_H_keepcoord_in
        kind: file
        path: results/ab_H_selaltloc.pdb
    outputs:
      - id: ab_H_keepcoord_out
        kind: file
        path: results/ab_H_keepcoord.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_keepcoord
        --input_file_path ${ab_H_keepcoord_in}
        --output_file_path ${ab_H_keepcoord_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_selres
    name: Select VH domain residues 1-120 from antibody H chain
    inputs:
      - id: ab_H_selres_config
        kind: file
        path: configs/selres_1_120.yaml
      - id: ab_H_selres_in
        kind: file
        path: results/ab_H_keepcoord.pdb
    outputs:
      - id: ab_H_selres_out
        kind: file
        path: results/ab_H_selres.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selres
        --config ${ab_H_selres_config}
        --input_file_path ${ab_H_selres_in}
        --output_file_path ${ab_H_selres_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_H_tidy_final
    name: Final tidy of antibody H-chain reduced structure
    inputs:
      - id: ab_H_tidy_final_in
        kind: file
        path: results/ab_H_selres.pdb
    outputs:
      - id: ab_H_reduced
        kind: file
        path: results/4G6K_H_reduced.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --input_file_path ${ab_H_tidy_final_in}
        --output_file_path ${ab_H_reduced}
    target:
      kind: local

  # ── Antibody L-chain preparation ─────────────────────────────────────────

  - kind: horus_task
    id: ab_L_tidy
    name: Tidy antibody PDB (strict, pre L-chain extraction)
    inputs:
      - id: ab_L_tidy_config
        kind: file
        path: configs/pdb_tidy_strict.yaml
      - id: ab_L_tidy_in
        kind: file
        path: results/4G6K_0.pdb
    outputs:
      - id: ab_L_tidy_out
        kind: file
        path: results/ab_L_tidy.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --config ${ab_L_tidy_config}
        --input_file_path ${ab_L_tidy_in}
        --output_file_path ${ab_L_tidy_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_selchain
    name: Extract light chain L from antibody
    inputs:
      - id: ab_L_selchain_config
        kind: file
        path: configs/selchain_L.yaml
      - id: ab_L_selchain_in
        kind: file
        path: results/ab_L_tidy.pdb
    outputs:
      - id: ab_L_selchain_out
        kind: file
        path: results/ab_L_selchain.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selchain
        --config ${ab_L_selchain_config}
        --input_file_path ${ab_L_selchain_in}
        --output_file_path ${ab_L_selchain_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_delhetatm
    name: Remove HETATM records from antibody L chain
    inputs:
      - id: ab_L_delhetatm_in
        kind: file
        path: results/ab_L_selchain.pdb
    outputs:
      - id: ab_L_delhetatm_out
        kind: file
        path: results/ab_L_delhetatm.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_delhetatm
        --input_file_path ${ab_L_delhetatm_in}
        --output_file_path ${ab_L_delhetatm_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_fixinsert
    name: Fix insertion codes in antibody L chain
    inputs:
      - id: ab_L_fixinsert_in
        kind: file
        path: results/ab_L_delhetatm.pdb
    outputs:
      - id: ab_L_fixinsert_out
        kind: file
        path: results/ab_L_fixinsert.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_fixinsert
        --input_file_path ${ab_L_fixinsert_in}
        --output_file_path ${ab_L_fixinsert_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_selaltloc
    name: Select highest-occupancy alt-locs in antibody L chain
    inputs:
      - id: ab_L_selaltloc_in
        kind: file
        path: results/ab_L_fixinsert.pdb
    outputs:
      - id: ab_L_selaltloc_out
        kind: file
        path: results/ab_L_selaltloc.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selaltloc
        --input_file_path ${ab_L_selaltloc_in}
        --output_file_path ${ab_L_selaltloc_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_keepcoord
    name: Remove non-coordinate records from antibody L chain
    inputs:
      - id: ab_L_keepcoord_in
        kind: file
        path: results/ab_L_selaltloc.pdb
    outputs:
      - id: ab_L_keepcoord_out
        kind: file
        path: results/ab_L_keepcoord.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_keepcoord
        --input_file_path ${ab_L_keepcoord_in}
        --output_file_path ${ab_L_keepcoord_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_selres
    name: Select VL domain residues 1-107 from antibody L chain
    inputs:
      - id: ab_L_selres_config
        kind: file
        path: configs/selres_1_107.yaml
      - id: ab_L_selres_in
        kind: file
        path: results/ab_L_keepcoord.pdb
    outputs:
      - id: ab_L_selres_out
        kind: file
        path: results/ab_L_selres.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selres
        --config ${ab_L_selres_config}
        --input_file_path ${ab_L_selres_in}
        --output_file_path ${ab_L_selres_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_L_tidy_final
    name: Final tidy of antibody L-chain reduced structure
    inputs:
      - id: ab_L_tidy_final_in
        kind: file
        path: results/ab_L_selres.pdb
    outputs:
      - id: ab_L_reduced
        kind: file
        path: results/4G6K_L_reduced.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --input_file_path ${ab_L_tidy_final_in}
        --output_file_path ${ab_L_reduced}
    target:
      kind: local

  # ── Merge antibody H+L and rename chain ──────────────────────────────────

  - kind: horus_task
    id: ab_zip_HL
    name: Zip antibody H and L chain PDBs for merge
    inputs:
      - id: ab_H_reduced
        kind: file
        path: results/4G6K_H_reduced.pdb
      - id: ab_L_reduced
        kind: file
        path: results/4G6K_L_reduced.pdb
    outputs:
      - id: ab_HL_zip
        kind: file
        path: results/4G6K_HL.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        zip -j ${ab_HL_zip} ${ab_H_reduced} ${ab_L_reduced}
    target:
      kind: local

  - kind: horus_task
    id: ab_merge
    name: Merge antibody H and L chains into single PDB
    inputs:
      - id: ab_HL_zip
        kind: file
        path: results/4G6K_HL.zip
    outputs:
      - id: ab_clean_merge
        kind: file
        path: results/4G6K_clean_merge.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_merge
        --input_file_path ${ab_HL_zip}
        --output_file_path ${ab_clean_merge}
    target:
      kind: local

  - kind: horus_task
    id: ab_reres
    name: Renumber antibody residues starting from 1
    inputs:
      - id: ab_reres_config
        kind: file
        path: configs/reres_1.yaml
      - id: ab_reres_in
        kind: file
        path: results/4G6K_clean_merge.pdb
    outputs:
      - id: ab_reres_out
        kind: file
        path: results/ab_reres.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_reres
        --config ${ab_reres_config}
        --input_file_path ${ab_reres_in}
        --output_file_path ${ab_reres_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_chain
    name: Set antibody chain identifier to A
    inputs:
      - id: ab_chain_config
        kind: file
        path: configs/chain_A.yaml
      - id: ab_chain_in
        kind: file
        path: results/ab_reres.pdb
    outputs:
      - id: ab_chain_out
        kind: file
        path: results/ab_chain.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_chain
        --config ${ab_chain_config}
        --input_file_path ${ab_chain_in}
        --output_file_path ${ab_chain_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_chainxseg
    name: Swap segment identifier for chain identifier in antibody
    inputs:
      - id: ab_chainxseg_in
        kind: file
        path: results/ab_chain.pdb
    outputs:
      - id: ab_chainxseg_out
        kind: file
        path: results/ab_chainxseg.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_chainxseg
        --input_file_path ${ab_chainxseg_in}
        --output_file_path ${ab_chainxseg_out}
    target:
      kind: local

  - kind: horus_task
    id: ab_tidy_final
    name: Final strict tidy of prepared antibody structure
    inputs:
      - id: ab_tidy_final_config
        kind: file
        path: configs/pdb_tidy_strict.yaml
      - id: ab_tidy_final_in
        kind: file
        path: results/ab_chainxseg.pdb
    outputs:
      - id: antibody_prep
        kind: file
        path: results/4G6K_clean.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --config ${ab_tidy_final_config}
        --input_file_path ${ab_tidy_final_in}
        --output_file_path ${antibody_prep}
    target:
      kind: local

  # ── Antigen preparation ───────────────────────────────────────────────────

  - kind: horus_task
    id: ag_tidy
    name: Tidy antigen PDB (strict)
    inputs:
      - id: ag_tidy_config
        kind: file
        path: configs/pdb_tidy_strict.yaml
      - id: ag_tidy_in
        kind: file
        path: results/4I1B_0.pdb
    outputs:
      - id: ag_tidy_out
        kind: file
        path: results/ag_tidy.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --config ${ag_tidy_config}
        --input_file_path ${ag_tidy_in}
        --output_file_path ${ag_tidy_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_delhetatm
    name: Remove HETATM records from antigen
    inputs:
      - id: ag_delhetatm_in
        kind: file
        path: results/ag_tidy.pdb
    outputs:
      - id: ag_delhetatm_out
        kind: file
        path: results/ag_delhetatm.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_delhetatm
        --input_file_path ${ag_delhetatm_in}
        --output_file_path ${ag_delhetatm_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_selaltloc
    name: Select highest-occupancy alt-locs in antigen
    inputs:
      - id: ag_selaltloc_in
        kind: file
        path: results/ag_delhetatm.pdb
    outputs:
      - id: ag_selaltloc_out
        kind: file
        path: results/ag_selaltloc.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selaltloc
        --input_file_path ${ag_selaltloc_in}
        --output_file_path ${ag_selaltloc_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_keepcoord
    name: Remove non-coordinate records from antigen
    inputs:
      - id: ag_keepcoord_in
        kind: file
        path: results/ag_selaltloc.pdb
    outputs:
      - id: ag_keepcoord_out
        kind: file
        path: results/ag_keepcoord.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_keepcoord
        --input_file_path ${ag_keepcoord_in}
        --output_file_path ${ag_keepcoord_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_chain
    name: Set antigen chain identifier to B
    inputs:
      - id: ag_chain_config
        kind: file
        path: configs/chain_B.yaml
      - id: ag_chain_in
        kind: file
        path: results/ag_keepcoord.pdb
    outputs:
      - id: ag_chain_out
        kind: file
        path: results/ag_chain.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_chain
        --config ${ag_chain_config}
        --input_file_path ${ag_chain_in}
        --output_file_path ${ag_chain_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_chainxseg
    name: Swap segment identifier for chain identifier in antigen
    inputs:
      - id: ag_chainxseg_in
        kind: file
        path: results/ag_chain.pdb
    outputs:
      - id: ag_chainxseg_out
        kind: file
        path: results/ag_chainxseg.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_chainxseg
        --input_file_path ${ag_chainxseg_in}
        --output_file_path ${ag_chainxseg_out}
    target:
      kind: local

  - kind: horus_task
    id: ag_tidy_final
    name: Final strict tidy of prepared antigen structure
    inputs:
      - id: ag_tidy_final_config
        kind: file
        path: configs/pdb_tidy_strict.yaml
      - id: ag_tidy_final_in
        kind: file
        path: results/ag_chainxseg.pdb
    outputs:
      - id: antigen_prep
        kind: file
        path: results/4I1B_clean.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_tidy
        --config ${ag_tidy_final_config}
        --input_file_path ${ag_tidy_final_in}
        --output_file_path ${antigen_prep}
    target:
      kind: local

  # ── Reference complex H-chain preparation ────────────────────────────────

  - kind: horus_task
    id: cx_H_selchain
    name: Extract heavy chain H from reference complex
    inputs:
      - id: cx_H_selchain_config
        kind: file
        path: configs/selchain_H.yaml
      - id: cx_H_selchain_in
        kind: file
        path: results/4G6M_0.pdb
    outputs:
      - id: cx_H_selchain_out
        kind: file
        path: results/cx_H_selchain.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selchain
        --config ${cx_H_selchain_config}
        --input_file_path ${cx_H_selchain_in}
        --output_file_path ${cx_H_selchain_out}
    target:
      kind: local

  - kind: horus_task
    id: cx_H_delhetatm
    name: Remove HETATM from reference complex H chain
    inputs:
      - id: cx_H_delhetatm_in
        kind: file
        path: results/cx_H_selchain.pdb
    outputs:
      - id: cx_H_delhetatm_out
        kind: file
        path: results/cx_H_delhetatm.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_delhetatm
        --input_file_path ${cx_H_delhetatm_in}
        --output_file_path ${cx_H_delhetatm_out}
    target:
      kind: local

  - kind: horus_task
    id: cx_H_fixinsert
    name: Fix insertion codes in reference complex H chain
    inputs:
      - id: cx_H_fixinsert_in
        kind: file
        path: results/cx_H_delhetatm.pdb
    outputs:
      - id: cx_H_fixinsert_out
        kind: file
        path: results/cx_H_fixinsert.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_fixinsert
        --input_file_path ${cx_H_fixinsert_in}
        --output_file_path ${cx_H_fixinsert_out}
    target:
      kind: local

  - kind: horus_task
    id: cx_H_selaltloc
    name: Select alt-locs in reference complex H chain
    inputs:
      - id: cx_H_selaltloc_in
        kind: file
        path: results/cx_H_fixinsert.pdb
    outputs:
      - id: cx_H_selaltloc_out
        kind: file
        path: results/cx_H_selaltloc.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        biobb_pdb_selaltloc
        --input_file_path ${cx_H_selaltloc_in}
        --output_file_path ${cx_H_selaltloc_out}
    target:
      kind: local

  - kind: horus_task
    id: cx_H_keepcoord
    name: Keep coordinates only in reference complex H chain
    inputs:
      - id: cx_H_keepcoord_in
        kind: file
        path: results/cx_H_selaltloc.pdb
    outputs:
      - id: cx_H_keepcoord_out
        kind: file
