  # ── Merge complex antibody + antigen to form reference complex ───────────

  - kind: horus_task
    id: cx_zip_AB
    name: Zip reference complex antibody and antigen PDBs for merge
    inputs:
      - id: cx_antibody_final
        kind: file
        path: results/4G6M_clean_antibody_final.pdb
      - id: cx_antigen_final
        kind: file
        path: results/4G6M_clean_antigen_final.pdb
    outputs:
      - id: cx_HL_B_zip
        kind: file
