edges:
  # curves → canal
  - source: curves
    source_output: curves_cda
    target: canal
    target_input: curves_cda

  - source: curves
    source_output: curves_lis
    target: canal
    target_input: curves_lis

  # canal → averages (base_pair_step)
  - source: canal
    source_output: canal_rise_ser
    target: avg_rise
    target_input: canal_rise_ser

  - source: canal
    source_output: canal_roll_ser
    target: avg_roll
    target_input: canal_roll_ser

  - source: canal
    source_output: canal_twist_ser
    target: avg_twist
    target_input: canal_twist_ser

  - source: canal
    source_output: canal_shift_ser
    target: avg_shift
    target_input: canal_shift_ser

  - source: canal
    source_output: canal_slide_ser
    target: avg_slide
    target_input: canal_slide_ser

  - source: canal
    source_output: canal_tilt_ser
    target: avg_tilt
    target_input: canal_tilt_ser

  # canal → averages (base_pair)
  - source: canal
    source_output: canal_shear_ser
    target: avg_shear
    target_input: canal_shear_ser

  - source: canal
    source_output: canal_stretch_ser
    target: avg_stretch
    target_input: canal_stretch_ser

  - source: canal
    source_output: canal_stagger_ser
    target: avg_stagger
    target_input: canal_stagger_ser

