  - source: canal
    source_output: canal_majw_ser
    target: avg_majw
    target_input: canal_majw_ser

  - source: canal
    source_output: canal_mind_ser
    target: avg_mind
    target_input: canal_mind_ser

  - source: canal
    source_output: canal_minw_ser
    target: avg_minw
    target_input: canal_minw_ser

  # canal → backbone
  - source: canal
    source_output: canal_phaseC_ser
    target: puckering
    target_input: canal_phaseC_ser

  - source: canal
    source_output: canal_phaseW_ser
    target: puckering
    target_input: canal_phaseW_ser

  - source: canal
    source_output: canal_alphaC_ser
    target: canonicalag
