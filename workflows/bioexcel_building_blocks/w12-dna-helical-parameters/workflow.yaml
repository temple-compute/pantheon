kind: horus_workflow
name: BioExcel DNA Helical Parameters Analysis

_executor: &executor
  kind: conda_python_environment
  environment_dir: "../.horus_conda_env"
  conda: conda
  environment_file: conda_env.yaml

_docker_executor: &docker_executor
  kind: docker
  image: quay.io/biocontainers/biobb_dna:5.2.1--pyhdfd78af_0

tasks:
  # ── Step 1: Curves+ ─────────────────────────────────────────────────────────
  - kind: horus_task
    id: curves
    name: Run Curves+ helical parameter extraction
    inputs:
      - id: curves_config
        kind: file
        path: configs/curves.yaml
      - id: traj
        kind: file
        path: TRAJ/structure.stripped.nc
      - id: top
        kind: file
        path: TRAJ/structure.stripped.top
    outputs:
      - id: curves_lis
        kind: file
        path: results/curves.out.lis
      - id: curves_cda
        kind: file
        path: results/curves.out.cda
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        biobb_curves
        --config ${curves_config}
        --input_struc_path ${traj}
        --input_top_path ${top}
        --output_lis_path ${curves_lis}
        --output_cda_path ${curves_cda}
    target:
      kind: local

  # ── Step 2: Canal ────────────────────────────────────────────────────────────
  - kind: horus_task
    id: canal
    name: Run Canal to generate time series and histograms
    inputs:
      - id: canal_config
        kind: file
        path: configs/canal.yaml
      - id: curves_cda
        kind: file
        path: results/curves.out.cda
      - id: curves_lis
        kind: file
        path: results/curves.out.lis
    outputs:
      - id: canal_zip
        kind: file
        path: results/canal.out.zip
      - id: canal_rise_ser
        kind: file
        path: results/canal_out/canal_output_rise.ser
      - id: canal_roll_ser
        kind: file
        path: results/canal_out/canal_output_roll.ser
      - id: canal_twist_ser
        kind: file
        path: results/canal_out/canal_output_twist.ser
      - id: canal_shift_ser
        kind: file
        path: results/canal_out/canal_output_shift.ser
      - id: canal_slide_ser
        kind: file
        path: results/canal_out/canal_output_slide.ser
      - id: canal_tilt_ser
        kind: file
        path: results/canal_out/canal_output_tilt.ser
      - id: canal_shear_ser
        kind: file
        path: results/canal_out/canal_output_shear.ser
      - id: canal_stretch_ser
        kind: file
        path: results/canal_out/canal_output_stretch.ser
      - id: canal_stagger_ser
        kind: file
        path: results/canal_out/canal_output_stagger.ser
      - id: canal_buckle_ser
        kind: file
        path: results/canal_out/canal_output_buckle.ser
      - id: canal_propel_ser
        kind: file
        path: results/canal_out/canal_output_propel.ser
      - id: canal_opening_ser
        kind: file
        path: results/canal_out/canal_output_opening.ser
      - id: canal_inclin_ser
        kind: file
        path: results/canal_out/canal_output_inclin.ser
      - id: canal_tip_ser
        kind: file
        path: results/canal_out/canal_output_tip.ser
      - id: canal_xdisp_ser
        kind: file
        path: results/canal_out/canal_output_xdisp.ser
      - id: canal_ydisp_ser
        kind: file
        path: results/canal_out/canal_output_ydisp.ser
      - id: canal_majd_ser
        kind: file
        path: results/canal_out/canal_output_majd.ser
      - id: canal_majw_ser
        kind: file
        path: results/canal_out/canal_output_majw.ser
      - id: canal_mind_ser
        kind: file
        path: results/canal_out/canal_output_mind.ser
      - id: canal_minw_ser
        kind: file
        path: results/canal_out/canal_output_minw.ser
      - id: canal_alphaC_ser
        kind: file
        path: results/canal_out/canal_output_alphaC.ser
      - id: canal_alphaW_ser
        kind: file
        path: results/canal_out/canal_output_alphaW.ser
      - id: canal_betaC_ser
        kind: file
        path: results/canal_out/canal_output_betaC.ser
      - id: canal_betaW_ser
        kind: file
        path: results/canal_out/canal_output_betaW.ser
      - id: canal_gammaC_ser
        kind: file
        path: results/canal_out/canal_output_gammaC.ser
      - id: canal_gammaW_ser
        kind: file
        path: results/canal_out/canal_output_gammaW.ser
      - id: canal_deltaC_ser
        kind: file
        path: results/canal_out/canal_output_deltaC.ser
      - id: canal_deltaW_ser
        kind: file
