        path: results/canal_out/canal_output_phaseC.ser
      - id: canal_phaseW_ser
        kind: file
        path: results/canal_out/canal_output_phaseW.ser
    executor: *docker_executor
    runtime:
      kind: command
      command: >-
        biobb_canal
        --config ${canal_config}
        --input_cda_file ${curves_cda}
        --input_lis_file ${curves_lis}
        --output_zip_path ${canal_zip}
        && unzip -o ${canal_zip} -d results/canal_out
    target:
      kind: local

  # ── Averages: Base Pair Step parameters ─────────────────────────────────────
