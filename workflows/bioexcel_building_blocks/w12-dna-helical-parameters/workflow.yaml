    target: avg_buckle
    target_input: canal_buckle_ser

  - source: canal
    source_output: canal_propel_ser
    target: avg_propel
    target_input: canal_propel_ser

  - source: canal
    source_output: canal_opening_ser
    target: avg_opening
    target_input: canal_opening_ser

  # canal → averages (axis)
  - source: canal
    source_output: canal_inclin_ser
    target: avg_inclin
    target_input: canal_inclin_ser

  - source: canal
    source_output: canal_tip_ser
    target: avg_tip
    target_input: canal_tip_ser

  - source: canal
    source_output: canal_xdisp_ser
    target: avg_xdisp
    target_input: canal_xdisp_ser

  - source: canal
    source_output: canal_ydisp_ser
    target: avg_ydisp
    target_input: canal_ydisp_ser

  # canal → averages (grooves)
  - source: canal
