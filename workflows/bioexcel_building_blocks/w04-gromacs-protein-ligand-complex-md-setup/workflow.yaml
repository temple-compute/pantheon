kind: horus_workflow
name: BioExcel MD Setup - Protein-Ligand Complex (3HTB + JZ4)

_executor: &executor
  kind: conda_python_environment
  environment_dir: "../.horus_conda_env"
  conda: conda
  environment_file: conda_env.yaml

tasks:
  - kind: horus_task
    id: fetch_pdb
    name: Download 3HTB structure from PDB
    inputs:
      - id: fetch_pdb_config
        kind: file
        path: configs/fetch_pdb.yaml
    outputs:
      - id: downloaded_pdb
        kind: file
        path: results/downloaded.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        pdb
        --config ${fetch_pdb_config}
        --output_pdb_path ${downloaded_pdb}
    target:
      kind: local

  - kind: horus_task
    id: extract_heteroatoms
    name: Extract JZ4 ligand from PDB
    inputs:
      - id: extract_heteroatoms_config
        kind: file
        path: configs/extract_heteroatoms.yaml
      - id: downloaded_pdb
        kind: file
        path: results/downloaded.pdb
    outputs:
      - id: ligand_pdb
        kind: file
        path: results/ligand.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        extract_heteroatoms
        --config ${extract_heteroatoms_config}
        --input_structure_path ${downloaded_pdb}
        --output_heteroatom_path ${ligand_pdb}
    target:
      kind: local

  - kind: horus_task
    id: extract_molecule
    name: Extract protein chain from PDB
    inputs:
      - id: downloaded_pdb
        kind: file
        path: results/downloaded.pdb
    outputs:
      - id: protein_pdb
        kind: file
        path: results/protein.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        extract_molecule
        --input_structure_path ${downloaded_pdb}
        --output_molecule_path ${protein_pdb}
    target:
      kind: local

  - kind: horus_task
    id: fix_side_chain
    name: Model missing side-chain atoms
    inputs:
      - id: protein_pdb
        kind: file
        path: results/protein.pdb
    outputs:
      - id: fixed_pdb
        kind: file
        path: results/fixed.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        fix_side_chain
        --input_pdb_path ${protein_pdb}
        --output_pdb_path ${fixed_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pdb2gmx
    name: Build GROMACS protein topology (amber99sb-ildn, SPC/E)
    inputs:
      - id: pdb2gmx_config
        kind: file
        path: configs/pdb2gmx.yaml
      - id: fixed_pdb
        kind: file
        path: results/fixed.pdb
    outputs:
      - id: pdb2gmx_gro
        kind: file
        path: results/pdb2gmx.gro
      - id: pdb2gmx_top
        kind: file
        path: results/pdb2gmx_top.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        pdb2gmx
        --config ${pdb2gmx_config}
        --input_pdb_path ${fixed_pdb}
        --output_gro_path ${pdb2gmx_gro}
        --output_top_zip_path ${pdb2gmx_top}
    target:
      kind: local

  - kind: horus_task
    id: reduce_add_hydrogens
    name: Add hydrogen atoms to ligand (Reduce)
    inputs:
      - id: reduce_add_hydrogens_config
        kind: file
        path: configs/reduce_add_hydrogens.yaml
      - id: ligand_pdb
        kind: file
        path: results/ligand.pdb
    outputs:
      - id: ligand_reduce_H_pdb
        kind: file
        path: results/ligand.reduce.H.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        reduce_add_hydrogens
        --config ${reduce_add_hydrogens_config}
        --input_path ${ligand_pdb}
        --output_path ${ligand_reduce_H_pdb}
    target:
      kind: local

  - kind: horus_task
    id: babel_minimize
    name: Energetically minimize ligand with hydrogens (OpenBabel GAFF)
    inputs:
      - id: babel_minimize_config
        kind: file
        path: configs/babel_minimize.yaml
      - id: ligand_reduce_H_pdb
        kind: file
        path: results/ligand.reduce.H.pdb
    outputs:
      - id: ligand_H_min_mol2
        kind: file
        path: results/ligand.H.min.mol2
    executor: *executor
    runtime:
      kind: command
      command: >-
        babel_minimize
        --config ${babel_minimize_config}
        --input_path ${ligand_reduce_H_pdb}
        --output_path ${ligand_H_min_mol2}
    target:
      kind: local

  - kind: horus_task
    id: acpype_params_gmx
    name: Generate ligand GROMACS topology (ACPype / amberGAFF)
    inputs:
      - id: acpype_params_gmx_config
        kind: file
        path: configs/acpype_params_gmx.yaml
      - id: ligand_H_min_mol2
        kind: file
        path: results/ligand.H.min.mol2
    outputs:
      - id: ligand_params_gro
        kind: file
        path: results/ligand.params.gro
      - id: ligand_params_itp
        kind: file
        path: results/ligand.params.itp
      - id: ligand_params_top
        kind: file
        path: results/ligand.params.top
    executor: *executor
    runtime:
      kind: command
      command: >-
        acpype_params_gmx
        --config ${acpype_params_gmx_config}
        --input_path ${ligand_H_min_mol2}
        --output_path_gro ${ligand_params_gro}
        --output_path_itp ${ligand_params_itp}
        --output_path_top ${ligand_params_top}
    target:
      kind: local

  - kind: horus_task
    id: make_ndx_ligand
    name: Create index file for ligand heavy atoms
    inputs:
      - id: make_ndx_ligand_config
        kind: file
        path: configs/make_ndx_ligand.yaml
      - id: ligand_params_gro
        kind: file
        path: results/ligand.params.gro
    outputs:
      - id: ligand_index_ndx
        kind: file
        path: results/ligand_index.ndx
    executor: *executor
    runtime:
      kind: command
      command: >-
        make_ndx
        --config ${make_ndx_ligand_config}
        --input_structure_path ${ligand_params_gro}
        --output_ndx_path ${ligand_index_ndx}
    target:
      kind: local

  - kind: horus_task
    id: genrestr
    name: Generate ligand position restraints (1000 kJ/mol·nm²)
    inputs:
      - id: genrestr_config
        kind: file
        path: configs/genrestr.yaml
      - id: ligand_params_gro
        kind: file
        path: results/ligand.params.gro
      - id: ligand_index_ndx
        kind: file
        path: results/ligand_index.ndx
    outputs:
      - id: ligand_posres_itp
        kind: file
        path: results/ligand_posres.itp
    executor: *executor
    runtime:
      kind: command
      command: >-
        genrestr
        --config ${genrestr_config}
        --input_structure_path ${ligand_params_gro}
        --input_ndx_path ${ligand_index_ndx}
        --output_itp_path ${ligand_posres_itp}
    target:
      kind: local

  - kind: horus_task
    id: trjconv_protein
    name: Convert protein GRO to PDB (with hydrogens)
    inputs:
      - id: trjconv_system_config
        kind: file
        path: configs/trjconv_system.yaml
      - id: pdb2gmx_gro
        kind: file
        path: results/pdb2gmx.gro
    outputs:
      - id: protein_H_pdb
        kind: file
        path: results/protein_H.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_trjconv_str
        --config ${trjconv_system_config}
        --input_structure_path ${pdb2gmx_gro}
        --input_top_path ${pdb2gmx_gro}
        --output_str_path ${protein_H_pdb}
    target:
      kind: local

  - kind: horus_task
    id: trjconv_ligand
    name: Convert ligand GRO to PDB (with hydrogens)
    inputs:
      - id: trjconv_system_config
        kind: file
        path: configs/trjconv_system.yaml
      - id: ligand_params_gro
        kind: file
        path: results/ligand.params.gro
    outputs:
      - id: ligand_H_pdb
        kind: file
        path: results/ligand_H.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_trjconv_str
        --config ${trjconv_system_config}
        --input_structure_path ${ligand_params_gro}
        --input_top_path ${ligand_params_gro}
        --output_str_path ${ligand_H_pdb}
    target:
      kind: local

  - kind: horus_task
    id: cat_pdb_complex
    name: Concatenate protein and ligand into complex structure
    inputs:
      - id: protein_H_pdb
        kind: file
        path: results/protein_H.pdb
      - id: ligand_H_pdb
        kind: file
        path: results/ligand_H.pdb
    outputs:
      - id: complex_H_pdb
        kind: file
        path: results/complex_H.pdb
    executor: *executor
    runtime:
      kind: command
      command: >-
        cat_pdb
        --input_structure1 ${protein_H_pdb}
        --input_structure2 ${ligand_H_pdb}
        --output_structure_path ${complex_H_pdb}
    target:
      kind: local

  - kind: horus_task
    id: append_ligand
    name: Append ligand topology to protein topology
    inputs:
      - id: append_ligand_config
        kind: file
        path: configs/append_ligand.yaml
      - id: pdb2gmx_top
        kind: file
        path: results/pdb2gmx_top.zip
      - id: ligand_posres_itp
        kind: file
        path: results/ligand_posres.itp
      - id: ligand_params_itp
        kind: file
        path: results/ligand.params.itp
    outputs:
      - id: complex_top
        kind: file
        path: results/complex_top.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        append_ligand
        --config ${append_ligand_config}
        --input_top_zip_path ${pdb2gmx_top}
        --input_posres_itp_path ${ligand_posres_itp}
        --input_itp_path ${ligand_params_itp}
        --output_top_zip_path ${complex_top}
    target:
      kind: local

  - kind: horus_task
    id: editconf
    name: Define truncated octahedron solvent box (0.8 nm)
    inputs:
      - id: editconf_config
        kind: file
        path: configs/editconf.yaml
      - id: complex_H_pdb
        kind: file
        path: results/complex_H.pdb
    outputs:
      - id: boxed_gro
        kind: file
        path: results/boxed.gro
    executor: *executor
    runtime:
      kind: command
      command: >-
        editconf
        --config ${editconf_config}
        --input_gro_path ${complex_H_pdb}
        --output_gro_path ${boxed_gro}
    target:
      kind: local

  - kind: horus_task
    id: solvate
    name: Fill box with SPC water molecules
    inputs:
      - id: boxed_gro
        kind: file
        path: results/boxed.gro
      - id: complex_top
        kind: file
        path: results/complex_top.zip
    outputs:
      - id: solvated_gro
        kind: file
        path: results/solvated.gro
      - id: solvated_top
        kind: file
        path: results/solvated_top.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        solvate
        --input_solute_gro_path ${boxed_gro}
        --input_top_zip_path ${complex_top}
        --output_gro_path ${solvated_gro}
        --output_top_zip_path ${solvated_top}
    target:
      kind: local

  - kind: horus_task
    id: grompp_ions
    name: Compile ion run file (grompp)
    inputs:
      - id: grompp_ions_config
        kind: file
        path: configs/grompp_ions.yaml
      - id: solvated_gro
        kind: file
        path: results/solvated.gro
      - id: solvated_top
        kind: file
        path: results/solvated_top.zip
    outputs:
      - id: ions_tpr
        kind: file
        path: results/ions.tpr
    executor: *executor
    runtime:
      kind: command
      command: >-
        grompp
        --config ${grompp_ions_config}
        --input_gro_path ${solvated_gro}
        --input_top_zip_path ${solvated_top}
        --output_tpr_path ${ions_tpr}
    target:
      kind: local

  - kind: horus_task
    id: genion
    name: Add neutralizing ions
    inputs:
      - id: genion_config
        kind: file
        path: configs/genion.yaml
      - id: ions_tpr
        kind: file
        path: results/ions.tpr
      - id: solvated_top
        kind: file
        path: results/solvated_top.zip
    outputs:
      - id: ionized_gro
        kind: file
        path: results/ionized.gro
      - id: ionized_top
        kind: file
        path: results/ionized_top.zip
    executor: *executor
    runtime:
      kind: command
      command: >-
        genion
        --config ${genion_config}
        --input_tpr_path ${ions_tpr}
        --input_top_zip_path ${solvated_top}
        --output_gro_path ${ionized_gro}
        --output_top_zip_path ${ionized_top}
    target:
      kind: local

  - kind: horus_task
    id: grompp_minimize
    name: Compile energy minimization run file (grompp)
    inputs:
      - id: grompp_minimize_config
        kind: file
        path: configs/grompp_minimize.yaml
      - id: ionized_gro
        kind: file
        path: results/ionized.gro
      - id: ionized_top
        kind: file
        path: results/ionized_top.zip
    outputs:
      - id: min_tpr
        kind: file
        path: results/min.tpr
    executor: *executor
    runtime:
      kind: command
      command: >-
        grompp
        --config ${grompp_minimize_config}
        --input_gro_path ${ionized_gro}
        --input_top_zip_path ${ionized_top}
        --output_tpr_path ${min_tpr}
    target:
      kind: local

  - kind: horus_task
    id: mdrun_minimize
    name: Energy minimization (steepest descent, max 500 kJ/mol·nm)
    inputs:
      - id: min_tpr
        kind: file
        path: results/min.tpr
    outputs:
      - id: minimized_gro
        kind: file
        path: results/minimized.gro
      - id: min_edr
        kind: file
        path: results/min.edr
    executor: *executor
    runtime:
      kind: command
      command: >-
        mdrun
        --input_tpr_path ${min_tpr}
        --output_gro_path ${minimized_gro}
        --output_edr_path ${min_edr}
        --output_trr_path min.trr
        --output_log_path min.log
    target:
      kind: local

  - kind: horus_task
    id: gmx_energy_min
    name: Extract potential energy from minimization
    inputs:
      - id: gmx_energy_min_config
        kind: file
        path: configs/gmx_energy_min.yaml
      - id: min_edr
        kind: file
        path: results/min.edr
    outputs:
      - id: min_energy_xvg
        kind: file
        path: results/min_energy.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_energy
        --config ${gmx_energy_min_config}
        --input_energy_path ${min_edr}
        --output_xvg_path ${min_energy_xvg}
    target:
      kind: local

  - kind: horus_task
    id: make_ndx_complex
    name: Create index file for protein-ligand complex group
    inputs:
      - id: make_ndx_complex_config
        kind: file
        path: configs/make_ndx_complex.yaml
      - id: minimized_gro
        kind: file
        path: results/minimized.gro
    outputs:
      - id: complex_index_ndx
        kind: file
        path: results/complex_index.ndx
    executor: *executor
    runtime:
      kind: command
      command: >-
        make_ndx
        --config ${make_ndx_complex_config}
        --input_structure_path ${minimized_gro}
        --output_ndx_path ${complex_index_ndx}
    target:
      kind: local

  - kind: horus_task
    id: grompp_nvt
    name: Compile NVT equilibration run file (grompp)
    inputs:
      - id: grompp_nvt_config
        kind: file
        path: configs/grompp_nvt.yaml
      - id: minimized_gro
        kind: file
        path: results/minimized.gro
      - id: ionized_top
        kind: file
        path: results/ionized_top.zip
      - id: complex_index_ndx
        kind: file
        path: results/complex_index.ndx
    outputs:
      - id: nvt_tpr
        kind: file
        path: results/nvt.tpr
    executor: *executor
    runtime:
      kind: command
      command: >-
        grompp
        --config ${grompp_nvt_config}
        --input_gro_path ${minimized_gro}
        --input_top_zip_path ${ionized_top}
        --input_ndx_path ${complex_index_ndx}
        --output_tpr_path ${nvt_tpr}
    target:
      kind: local

  - kind: horus_task
    id: mdrun_nvt
    name: NVT equilibration (restrained, Protein_Other + Water_and_ions coupling)
    inputs:
      - id: nvt_tpr
        kind: file
        path: results/nvt.tpr
    outputs:
      - id: nvt_gro
        kind: file
        path: results/nvt.gro
      - id: nvt_cpt
        kind: file
        path: results/nvt.cpt
      - id: nvt_edr
        kind: file
        path: results/nvt.edr
    executor: *executor
    runtime:
      kind: command
      command: >-
        mdrun
        --input_tpr_path ${nvt_tpr}
        --output_gro_path ${nvt_gro}
        --output_cpt_path ${nvt_cpt}
        --output_edr_path ${nvt_edr}
        --output_trr_path nvt.trr
        --output_log_path nvt.log
    target:
      kind: local

  - kind: horus_task
    id: gmx_energy_nvt
    name: Extract system temperature during NVT equilibration
    inputs:
      - id: gmx_energy_nvt_config
        kind: file
        path: configs/gmx_energy_nvt.yaml
      - id: nvt_edr
        kind: file
        path: results/nvt.edr
    outputs:
      - id: nvt_temp_xvg
        kind: file
        path: results/nvt_temp.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_energy
        --config ${gmx_energy_nvt_config}
        --input_energy_path ${nvt_edr}
        --output_xvg_path ${nvt_temp_xvg}
    target:
      kind: local

  - kind: horus_task
    id: grompp_npt
    name: Compile NPT equilibration run file (grompp)
    inputs:
      - id: grompp_npt_config
        kind: file
        path: configs/grompp_npt.yaml
      - id: nvt_gro
        kind: file
        path: results/nvt.gro
      - id: nvt_cpt
        kind: file
        path: results/nvt.cpt
      - id: ionized_top
        kind: file
        path: results/ionized_top.zip
      - id: complex_index_ndx
        kind: file
        path: results/complex_index.ndx
    outputs:
      - id: npt_tpr
        kind: file
        path: results/npt.tpr
    executor: *executor
    runtime:
      kind: command
      command: >-
        grompp
        --config ${grompp_npt_config}
        --input_gro_path ${nvt_gro}
        --input_cpt_path ${nvt_cpt}
        --input_top_zip_path ${ionized_top}
        --input_ndx_path ${complex_index_ndx}
        --output_tpr_path ${npt_tpr}
    target:
      kind: local

  - kind: horus_task
    id: mdrun_npt
    name: NPT equilibration (restrained, pressure coupling enabled)
    inputs:
      - id: npt_tpr
        kind: file
        path: results/npt.tpr
    outputs:
      - id: npt_gro
        kind: file
        path: results/npt.gro
      - id: npt_cpt
        kind: file
        path: results/npt.cpt
      - id: npt_edr
        kind: file
        path: results/npt.edr
    executor: *executor
    runtime:
      kind: command
      command: >-
        mdrun
        --input_tpr_path ${npt_tpr}
        --output_gro_path ${npt_gro}
        --output_cpt_path ${npt_cpt}
        --output_edr_path ${npt_edr}
        --output_trr_path npt.trr
        --output_log_path npt.log
    target:
      kind: local

  - kind: horus_task
    id: gmx_energy_npt
    name: Extract pressure and density during NPT equilibration
    inputs:
      - id: gmx_energy_npt_config
        kind: file
        path: configs/gmx_energy_npt.yaml
      - id: npt_edr
        kind: file
        path: results/npt.edr
    outputs:
      - id: npt_PD_xvg
        kind: file
        path: results/npt_PD.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_energy
        --config ${gmx_energy_npt_config}
        --input_energy_path ${npt_edr}
        --output_xvg_path ${npt_PD_xvg}
    target:
      kind: local

  - kind: horus_task
    id: grompp_free
    name: Compile free MD run file (grompp)
    inputs:
      - id: grompp_free_config
        kind: file
        path: configs/grompp_free.yaml
      - id: npt_gro
        kind: file
        path: results/npt.gro
      - id: npt_cpt
        kind: file
        path: results/npt.cpt
      - id: ionized_top
        kind: file
        path: results/ionized_top.zip
    outputs:
      - id: md_tpr
        kind: file
        path: results/md.tpr
    executor: *executor
    runtime:
      kind: command
      command: >-
        grompp
        --config ${grompp_free_config}
        --input_gro_path ${npt_gro}
        --input_cpt_path ${npt_cpt}
        --input_top_zip_path ${ionized_top}
        --output_tpr_path ${md_tpr}
    target:
      kind: local

  - kind: horus_task
    id: mdrun_free
    name: Free MD simulation (50 ps, unrestrained)
    inputs:
      - id: md_tpr
        kind: file
        path: results/md.tpr
    outputs:
      - id: md_gro
        kind: file
        path: results/md.gro
      - id: md_trr
        kind: file
        path: results/md.trr
    executor: *executor
    runtime:
      kind: command
      command: >-
        mdrun
        --input_tpr_path ${md_tpr}
        --output_gro_path ${md_gro}
        --output_trr_path ${md_trr}
        --output_edr_path md.edr
        --output_log_path md.log
        --output_cpt_path md.cpt
    target:
      kind: local

  - kind: horus_task
    id: gmx_rms_first
    name: RMSd vs minimized/equilibrated structure (backbone)
    inputs:
      - id: gmx_rms_config
        kind: file
        path: configs/gmx_rms.yaml
      - id: md_tpr
        kind: file
        path: results/md.tpr
      - id: md_trr
        kind: file
        path: results/md.trr
    outputs:
      - id: rms_first_xvg
        kind: file
        path: results/rms_first.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_rms
        --config ${gmx_rms_config}
        --input_structure_path ${md_tpr}
        --input_traj_path ${md_trr}
        --output_xvg_path ${rms_first_xvg}
    target:
      kind: local

  - kind: horus_task
    id: gmx_rms_exp
    name: RMSd vs experimental structure (backbone)
    inputs:
      - id: gmx_rms_config
        kind: file
        path: configs/gmx_rms.yaml
      - id: min_tpr
        kind: file
        path: results/min.tpr
      - id: md_trr
        kind: file
        path: results/md.trr
    outputs:
      - id: rms_exp_xvg
        kind: file
        path: results/rms_exp.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_rms
        --config ${gmx_rms_config}
        --input_structure_path ${min_tpr}
        --input_traj_path ${md_trr}
        --output_xvg_path ${rms_exp_xvg}
    target:
      kind: local

  - kind: horus_task
    id: gmx_rgyr
    name: Radius of gyration during free MD (backbone)
    inputs:
      - id: gmx_rgyr_config
        kind: file
        path: configs/gmx_rgyr.yaml
      - id: min_tpr
        kind: file
        path: results/min.tpr
      - id: md_trr
        kind: file
        path: results/md.trr
    outputs:
      - id: rgyr_xvg
        kind: file
        path: results/rgyr.xvg
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_rgyr
        --config ${gmx_rgyr_config}
        --input_structure_path ${min_tpr}
        --input_traj_path ${md_trr}
        --output_xvg_path ${rgyr_xvg}
    target:
      kind: local

  - kind: horus_task
    id: gmx_image
    name: Center complex and strip solvent from trajectory
    inputs:
      - id: gmx_image_config
        kind: file
        path: configs/gmx_image.yaml
      - id: md_trr
        kind: file
        path: results/md.trr
      - id: md_tpr
        kind: file
        path: results/md.tpr
      - id: complex_index_ndx
        kind: file
        path: results/complex_index.ndx
    outputs:
      - id: imaged_trr
        kind: file
        path: results/imaged.trr
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_image
        --config ${gmx_image_config}
        --input_traj_path ${md_trr}
        --input_top_path ${md_tpr}
        --input_index_path ${complex_index_ndx}
        --output_traj_path ${imaged_trr}
    target:
      kind: local

  - kind: horus_task
    id: gmx_trjconv_str_dry
    name: Extract dry protein-ligand structure (remove solvent)
    inputs:
      - id: dry_trjconv_config
        kind: file
        path: configs/dry_trjconv.yaml
      - id: md_gro
        kind: file
        path: results/md.gro
      - id: md_tpr
        kind: file
        path: results/md.tpr
      - id: complex_index_ndx
        kind: file
        path: results/complex_index.ndx
    outputs:
      - id: dry_gro
        kind: file
        path: results/dry.gro
    executor: *executor
    runtime:
      kind: command
      command: >-
        gmx_trjconv_str
        --config ${dry_trjconv_config}
        --input_structure_path ${md_gro}
        --input_top_path ${md_tpr}
        --input_index_path ${complex_index_ndx}
        --output_str_path ${dry_gro}
    target:
      kind: local

