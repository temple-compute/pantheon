    source_output: dmd_crd
    target: cpptraj_rms_dmd
    target_input: dmd_crd

  # extract_atoms_ca → nma_run
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: nma_run
    target_input: ca_pdb

  # extract_atoms_ca → cpptraj_rms_nma
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: cpptraj_rms_nma
    target_input: ca_pdb

  # nma_run → cpptraj_rms_nma
  - source: nma_run
    source_output: nma_crd
    target: cpptraj_rms_nma
    target_input: nma_crd

  # extract_atoms_ca → pcz_zip_bd
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: pcz_zip_bd
    target_input: ca_pdb

  # bd_run → pcz_zip_bd
  - source: bd_run
    source_output: bd_crd
    target: pcz_zip_bd
    target_input: bd_crd

  # extract_atoms_ca → pcz_zip_dmd
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: pcz_zip_dmd
    target_input: ca_pdb

  # dmd_run → pcz_zip_dmd
