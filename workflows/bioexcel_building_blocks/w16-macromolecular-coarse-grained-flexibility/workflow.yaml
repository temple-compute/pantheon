edges:
  # fetch_pdb → extract_atoms_ca
  - source: fetch_pdb
    source_output: downloaded_pdb
    target: extract_atoms_ca
    target_input: downloaded_pdb

  # extract_atoms_ca → bd_run
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: bd_run
    target_input: ca_pdb

  # extract_atoms_ca → cpptraj_rms_bd
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: cpptraj_rms_bd
    target_input: ca_pdb

  # bd_run → cpptraj_rms_bd
  - source: bd_run
    source_output: bd_crd
    target: cpptraj_rms_bd
    target_input: bd_crd

  # extract_atoms_ca → dmd_run
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: dmd_run
    target_input: ca_pdb

  # extract_atoms_ca → cpptraj_rms_dmd
  - source: extract_atoms_ca
    source_output: ca_pdb
    target: cpptraj_rms_dmd
    target_input: ca_pdb

  # dmd_run → cpptraj_rms_dmd
