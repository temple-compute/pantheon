    target: pcz_zip_nma
    target_input: ca_pdb

  # nma_run → pcz_zip_nma
  - source: nma_run
    source_output: nma_crd
    target: pcz_zip_nma
    target_input: nma_crd

  # pcz_zip_bd → pcz_unzip_bd
  - source: pcz_zip_bd
    source_output: bd_pcz
    target: pcz_unzip_bd
    target_input: bd_pcz

  # pcz_zip_dmd → pcz_unzip_dmd
  - source: pcz_zip_dmd
    source_output: dmd_pcz
    target: pcz_unzip_dmd
    target_input: dmd_pcz

