kind: horus_workflow
name: BioExcel FlexServ - Protein Conformational Dynamics (1A32)

_executor: &executor
  kind: conda_python_environment
  environment_dir: "../.horus_conda_env"
  conda: micromamba
  environment_file: conda_env.yaml

_docker_executor_flexserv: &docker_executor_flexserv
  kind: docker
  image: quay.io/biocontainers/biobb_flexserv:5.2.1--py310pl5321ha6fa2df_0

tasks:
  - kind: horus_task
    id: fetch_pdb
    name: Download 1A32 structure from PDB
    inputs:
      - id: fetch_pdb_config
        kind: file
        path: configs/fetch_pdb.yaml
    outputs:
      - id: downloaded_pdb
        kind: file
        path: results/1a32.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pdb
        --config ${fetch_pdb_config}
        --output_pdb_path ${downloaded_pdb}
    target:
      kind: local

  - kind: horus_task
    id: extract_atoms_ca
    name: Extract C-alpha atoms from structure
    inputs:
      - id: extract_atoms_ca_config
        kind: file
        path: configs/extract_atoms_ca.yaml
      - id: downloaded_pdb
        kind: file
        path: results/1a32.pdb
    outputs:
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        extract_atoms
        --config ${extract_atoms_ca_config}
        --input_structure_path ${downloaded_pdb}
        --output_structure_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: bd_run
    name: Run Brownian Dynamics (BD) conformational ensemble
    inputs:
      - id: bd_run_config
        kind: file
        path: configs/bd_run.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
    outputs:
      - id: bd_crd
        kind: file
        path: results/bd_ensemble.mdcrd
      - id: bd_log
        kind: file
        path: results/bd_ensemble.log
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        bd_run
        --config ${bd_run_config}
        --input_pdb_path ${ca_pdb}
        --output_crd_path ${bd_crd}
        --output_log_path ${bd_log}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_bd
    name: Compute RMSD for BD ensemble trajectory
    inputs:
      - id: cpptraj_rms_bd_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: bd_crd
        kind: file
        path: results/bd_ensemble.mdcrd
    outputs:
      - id: bd_rmsd
        kind: file
        path: results/bd_ensemble_rmsd.dat
      - id: bd_xtc
        kind: file
        path: results/bd_ensemble.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_bd_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${bd_crd}
        --output_cpptraj_path ${bd_rmsd}
        --output_traj_path ${bd_xtc}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: dmd_run
    name: Run Discrete Molecular Dynamics (DMD) conformational ensemble
    inputs:
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
    outputs:
      - id: dmd_crd
        kind: file
        path: results/dmd_ensemble.mdcrd
      - id: dmd_log
        kind: file
        path: results/dmd_ensemble.log
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        dmd_run
        --input_pdb_path ${ca_pdb}
        --output_crd_path ${dmd_crd}
        --output_log_path ${dmd_log}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_dmd
    name: Compute RMSD for DMD ensemble trajectory
    inputs:
      - id: cpptraj_rms_dmd_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: dmd_crd
        kind: file
        path: results/dmd_ensemble.mdcrd
    outputs:
      - id: dmd_rmsd
        kind: file
        path: results/dmd_ensemble_rmsd.dat
      - id: dmd_xtc
        kind: file
        path: results/dmd_ensemble.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_dmd_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${dmd_crd}
        --output_cpptraj_path ${dmd_rmsd}
        --output_traj_path ${dmd_xtc}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: nma_run
    name: Run Normal Mode Analysis (NMA) conformational ensemble
    inputs:
      - id: nma_run_config
        kind: file
        path: configs/nma_run.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
    outputs:
      - id: nma_crd
        kind: file
        path: results/nma_ensemble.mdcrd
      - id: nma_log
        kind: file
        path: results/nma_ensemble.log
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        nma_run
        --config ${nma_run_config}
        --input_pdb_path ${ca_pdb}
        --output_crd_path ${nma_crd}
        --output_log_path ${nma_log}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_nma
    name: Compute RMSD for NMA ensemble trajectory
    inputs:
      - id: cpptraj_rms_nma_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: nma_crd
        kind: file
        path: results/nma_ensemble.mdcrd
    outputs:
      - id: nma_rmsd
        kind: file
        path: results/nma_ensemble_rmsd.dat
      - id: nma_xtc
        kind: file
        path: results/nma_ensemble.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_nma_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${nma_crd}
        --output_cpptraj_path ${nma_rmsd}
        --output_traj_path ${nma_xtc}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_zip_bd
    name: Compress BD trajectory with PCA (PCZ format)
    inputs:
      - id: pcz_zip_bd_config
        kind: file
        path: configs/pcz_zip.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: bd_crd
        kind: file
        path: results/bd_ensemble.mdcrd
    outputs:
      - id: bd_pcz
        kind: file
        path: results/bd_ensemble.pcz
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_zip
        --config ${pcz_zip_bd_config}
        --input_pdb_path ${ca_pdb}
        --input_crd_path ${bd_crd}
        --output_pcz_path ${bd_pcz}
    target:
      kind: local

  - kind: horus_task
    id: pcz_zip_dmd
    name: Compress DMD trajectory with PCA (PCZ format)
    inputs:
      - id: pcz_zip_dmd_config
        kind: file
        path: configs/pcz_zip.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: dmd_crd
        kind: file
        path: results/dmd_ensemble.mdcrd
    outputs:
      - id: dmd_pcz
        kind: file
        path: results/dmd_ensemble.pcz
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_zip
        --config ${pcz_zip_dmd_config}
        --input_pdb_path ${ca_pdb}
        --input_crd_path ${dmd_crd}
        --output_pcz_path ${dmd_pcz}
    target:
      kind: local

  - kind: horus_task
    id: pcz_zip_nma
    name: Compress NMA trajectory with PCA (PCZ format)
    inputs:
      - id: pcz_zip_nma_config
        kind: file
        path: configs/pcz_zip.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: nma_crd
        kind: file
        path: results/nma_ensemble.mdcrd
    outputs:
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_zip
        --config ${pcz_zip_nma_config}
        --input_pdb_path ${ca_pdb}
        --input_crd_path ${nma_crd}
        --output_pcz_path ${nma_pcz}
    target:
      kind: local

  - kind: horus_task
    id: pcz_unzip_bd
    name: Decompress BD PCZ trajectory back to CRD
    inputs:
      - id: bd_pcz
        kind: file
        path: results/bd_ensemble.pcz
    outputs:
      - id: bd_crd_uncompressed
        kind: file
        path: results/bd_ensemble_uncompressed.crd
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_unzip
        --input_pcz_path ${bd_pcz}
        --output_crd_path ${bd_crd_uncompressed}
    target:
      kind: local

  - kind: horus_task
    id: pcz_unzip_dmd
    name: Decompress DMD PCZ trajectory back to CRD
    inputs:
      - id: dmd_pcz
        kind: file
        path: results/dmd_ensemble.pcz
    outputs:
      - id: dmd_crd_uncompressed
        kind: file
        path: results/dmd_ensemble_uncompressed.crd
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_unzip
        --input_pcz_path ${dmd_pcz}
        --output_crd_path ${dmd_crd_uncompressed}
    target:
      kind: local

  - kind: horus_task
    id: pcz_unzip_nma
    name: Decompress NMA PCZ trajectory back to CRD
    inputs:
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: nma_crd_uncompressed
        kind: file
        path: results/nma_ensemble_uncompressed.crd
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_unzip
        --input_pcz_path ${nma_pcz}
        --output_crd_path ${nma_crd_uncompressed}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_bd_uncompressed
    name: Compute RMSD for decompressed BD trajectory
    inputs:
      - id: cpptraj_rms_bd_unc_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: bd_crd_uncompressed
        kind: file
        path: results/bd_ensemble_uncompressed.crd
    outputs:
      - id: bd_uncompressed_rmsd
        kind: file
        path: results/bd_ensemble_uncompressed.rmsd.dat
      - id: bd_xtc_uncompressed
        kind: file
        path: results/bd_ensemble_uncompressed.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_bd_unc_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${bd_crd_uncompressed}
        --output_cpptraj_path ${bd_uncompressed_rmsd}
        --output_traj_path ${bd_xtc_uncompressed}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_dmd_uncompressed
    name: Compute RMSD for decompressed DMD trajectory
    inputs:
      - id: cpptraj_rms_dmd_unc_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: dmd_crd_uncompressed
        kind: file
        path: results/dmd_ensemble_uncompressed.crd
    outputs:
      - id: dmd_uncompressed_rmsd
        kind: file
        path: results/dmd_ensemble_uncompressed.rmsd.dat
      - id: dmd_xtc_uncompressed
        kind: file
        path: results/dmd_ensemble_uncompressed.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_dmd_unc_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${dmd_crd_uncompressed}
        --output_cpptraj_path ${dmd_uncompressed_rmsd}
        --output_traj_path ${dmd_xtc_uncompressed}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_rms_nma_uncompressed
    name: Compute RMSD for decompressed NMA trajectory
    inputs:
      - id: cpptraj_rms_nma_unc_config
        kind: file
        path: configs/cpptraj_rms.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: nma_crd_uncompressed
        kind: file
        path: results/nma_ensemble_uncompressed.crd
    outputs:
      - id: nma_uncompressed_rmsd
        kind: file
        path: results/nma_ensemble_uncompressed.rmsd.dat
      - id: nma_xtc_uncompressed
        kind: file
        path: results/nma_ensemble_uncompressed.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_rms
        --config ${cpptraj_rms_nma_unc_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${nma_crd_uncompressed}
        --output_cpptraj_path ${nma_uncompressed_rmsd}
        --output_traj_path ${nma_xtc_uncompressed}
        --input_exp_path ${ca_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_info
    name: Extract PCA information from NMA PCZ file
    inputs:
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: pcz_report
        kind: file
        path: results/pcz_report.json
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_info
        --input_pcz_path ${nma_pcz}
        --output_json_path ${pcz_report}
    target:
      kind: local

  - kind: horus_task
    id: pcz_evecs
    name: Extract eigenvectors from NMA PCZ file
    inputs:
      - id: pcz_evecs_config
        kind: file
        path: configs/pcz_evecs.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: pcz_evecs_report
        kind: file
        path: results/pcz_evecs.json
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_evecs
        --config ${pcz_evecs_config}
        --input_pcz_path ${nma_pcz}
        --output_json_path ${pcz_evecs_report}
    target:
      kind: local

  - kind: horus_task
    id: pcz_animate
    name: Animate NMA principal component eigenvector 1
    inputs:
      - id: pcz_animate_config
        kind: file
        path: configs/pcz_animate.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: proj1_crd
        kind: file
        path: results/pcz_proj1.crd
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_animate
        --config ${pcz_animate_config}
        --input_pcz_path ${nma_pcz}
        --output_crd_path ${proj1_crd}
    target:
      kind: local

  - kind: horus_task
    id: cpptraj_convert_proj1
    name: Convert PC1 animation trajectory to XTC format
    inputs:
      - id: cpptraj_convert_proj1_config
        kind: file
        path: configs/cpptraj_convert_proj1.yaml
      - id: ca_pdb
        kind: file
        path: results/1a32_ca.pdb
      - id: proj1_crd
        kind: file
        path: results/pcz_proj1.crd
    outputs:
      - id: proj1_xtc
        kind: file
        path: results/pcz_proj1.xtc
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        cpptraj_convert
        --config ${cpptraj_convert_proj1_config}
        --input_top_path ${ca_pdb}
        --input_traj_path ${proj1_crd}
        --output_cpptraj_path ${proj1_xtc}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_all
    name: Compute B-factors from all NMA principal components
    inputs:
      - id: pcz_bfactor_all_config
        kind: file
        path: configs/pcz_bfactor_all.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_all_dat
        kind: file
        path: results/bfactor_all.dat
      - id: bfactor_all_pdb
        kind: file
        path: results/bfactor_all.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_all_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_all_dat}
        --output_pdb_path ${bfactor_all_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_mode1
    name: Compute B-factors from NMA principal component 1
    inputs:
      - id: pcz_bfactor_mode1_config
        kind: file
        path: configs/pcz_bfactor_mode1.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_mode1_dat
        kind: file
        path: results/bfactor_mode1.dat
      - id: bfactor_mode1_pdb
        kind: file
        path: results/bfactor_mode1.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_mode1_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_mode1_dat}
        --output_pdb_path ${bfactor_mode1_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_mode2
    name: Compute B-factors from NMA principal component 2
    inputs:
      - id: pcz_bfactor_mode2_config
        kind: file
        path: configs/pcz_bfactor_mode2.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_mode2_dat
        kind: file
        path: results/bfactor_mode2.dat
      - id: bfactor_mode2_pdb
        kind: file
        path: results/bfactor_mode2.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_mode2_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_mode2_dat}
        --output_pdb_path ${bfactor_mode2_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_mode3
    name: Compute B-factors from NMA principal component 3
    inputs:
      - id: pcz_bfactor_mode3_config
        kind: file
        path: configs/pcz_bfactor_mode3.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_mode3_dat
        kind: file
        path: results/bfactor_mode3.dat
      - id: bfactor_mode3_pdb
        kind: file
        path: results/bfactor_mode3.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_mode3_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_mode3_dat}
        --output_pdb_path ${bfactor_mode3_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_mode4
    name: Compute B-factors from NMA principal component 4
    inputs:
      - id: pcz_bfactor_mode4_config
        kind: file
        path: configs/pcz_bfactor_mode4.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_mode4_dat
        kind: file
        path: results/bfactor_mode4.dat
      - id: bfactor_mode4_pdb
        kind: file
        path: results/bfactor_mode4.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_mode4_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_mode4_dat}
        --output_pdb_path ${bfactor_mode4_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_bfactor_mode5
    name: Compute B-factors from NMA principal component 5
    inputs:
      - id: pcz_bfactor_mode5_config
        kind: file
        path: configs/pcz_bfactor_mode5.yaml
      - id: nma_pcz
        kind: file
        path: results/nma_ensemble.pcz
    outputs:
      - id: bfactor_mode5_dat
        kind: file
        path: results/bfactor_mode5.dat
      - id: bfactor_mode5_pdb
        kind: file
        path: results/bfactor_mode5.pdb
    executor: *docker_executor_flexserv
    runtime:
      kind: command
      command: >-
        pcz_bfactor
        --config ${pcz_bfactor_mode5_config}
        --input_pcz_path ${nma_pcz}
        --output_dat_path ${bfactor_mode5_dat}
        --output_pdb_path ${bfactor_mode5_pdb}
    target:
      kind: local

  - kind: horus_task
    id: pcz_hinges_bfactor
    name: Detect hinge regions in BD trajectory (B-factor slope method)
    inputs:
      - id: pcz_hinges_bfactor_config
        kind: file
        path: configs/pcz_hinges_bfactor.yaml
      - id: bd_pcz
